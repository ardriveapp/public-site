name: Deploy to GitHub Pages (Production)

on:
  workflow_dispatch: # Only manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Clear Next.js build cache
        run: rm -rf .next out

      - name: Set GitHub Pages env
        id: base_path
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *".github.io" ]]; then
            echo "base_path=" >> $GITHUB_OUTPUT
            echo "site_url=https://$REPO_NAME" >> $GITHUB_OUTPUT
          else
            echo "base_path=/$REPO_NAME" >> $GITHUB_OUTPUT
            echo "site_url=https://$REPO_OWNER.github.io" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: yarn build
        env:
          NODE_ENV: production
          BASE_PATH: ${{ steps.base_path.outputs.base_path }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base_path.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.base_path.outputs.site_url }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "./out" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
